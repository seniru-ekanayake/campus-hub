name: Autonomous Security Fix

on:
  workflow_dispatch:
    inputs:
      scan_id:
        description: 'The ID of the scan run that triggered this fix'
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Open-Source Security Fixes
        run: |
          echo "Applying automated security fixes using open-source tools..."
          
          # Fix for Node.js projects
          if [ -f package.json ]; then
            echo "Detected Node.js project. Running npm audit fix..."
            npm audit fix --force || echo "npm audit fix failed, but continuing..."
          fi

          # Fix for Python projects
          if [ -f requirements.txt ]; then
            echo "Detected Python project. Running pip-audit..."
            python3 -m pip install pip-audit
            # pip-audit doesn't have a direct 'fix' like npm, but we can try to update dependencies
            # This is a simplified approach to update vulnerable packages
            pip-audit --fix || echo "pip-audit fix failed, but continuing..."
          fi

          # Fix for Docker projects
          if [ -f Dockerfile ]; then
            echo "Detected Dockerfile. Checking for base image updates..."
            # Simple logic to suggest or pull latest base images could go here
          fi

      - name: Commit and Push Fixes
        run: |
          git config --global user.name "GitSecBot"
          git config --global user.email "bot@gitsec.com"
          git add .
          git commit -m "🤖 Auto-fix security issues (Scan ID: ${{ github.event.inputs.scan_id }})" || echo "No changes to commit"
          git push origin main

      - name: Notify Telegram of Completion
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<EOF
          import os, requests
          url = f"https://api.telegram.org/bot{os.environ["TELEGRAM_BOT_TOKEN"]}/sendMessage"
          payload = {
              "chat_id": os.environ["TELEGRAM_CHAT_ID"],
              "text": "✅ *Security Fixes Applied!*\n\nI've successfully applied automated fixes using open-source tools (like `npm audit fix` or `pip-audit` ) and pushed the changes to the `main` branch.\n\nSummary: Dependencies updated and common vulnerabilities patched.",
              "parse_mode": "Markdown",
          }
          requests.post(url, json=payload)
          EOF
